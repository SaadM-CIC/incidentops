{% extends 'base/base.html' %}
{% block title %}Smart Claim{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-4 fw-bold">Smart Claim</h1>
    <p class="lead text-muted mb-4">
        Plateforme de gestion des incidents informatiques
    </p>
    {% if user.is_authenticated %}
        <a href="{% url 'dashboard:index' %}" class="btn btn-primary btn-lg">
            Mon tableau de bord
        </a>
    {% else %}
        <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg me-2">
            Se connecter
        </a>
        <a href="{% url 'accounts:register' %}" class="btn btn-outline-secondary btn-lg">
            Créer un compte
        </a>
    {% endif %}
</div>
{% endblock %}
